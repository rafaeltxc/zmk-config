# Uncomment the following lines to enable the Corne RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=1
CONFIG_ZMK_RGB_UNDERGLOW_SAT_STEP=1
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=100

CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=1
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=1
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=100

CONFIG_ZMK_RGB_UNDERGLOW_BRT_MIN=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=100

# Uncomment the following line to enable the Corne OLED Display
CONFIG_ZMK_DISPLAY=y
